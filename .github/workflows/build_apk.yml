name: Build Android APK

on:
  push:
    branches: [ main, master ] # Catch main or master branches
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Prepare Secrets Configuration
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cp .env.example .env
        if [ ! -z "$GEMINI_API_KEY" ]; then
          echo "Injecting GEMINI_API_KEY from GitHub Secrets..."
          sed -i "s|GEMINI_API_KEY=.*|GEMINI_API_KEY=$GEMINI_API_KEY|g" .env
        else
          echo "No GEMINI_API_KEY secret found. Using default placeholder."
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make Gradle Executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Assistant-APK
        path: app/build/outputs/apk/debug/app-debug.apk
